/Version: "WSC_2031"  # Rip

# NOTE: ALL PATHS ARE RELATIVE TO $STRAT_ROOT

/Car: # Car characterizationss
  car_mass: 284 # kg
  cda: 0.12 # Unitless
  motor_efficiency: 0.9 # Unitless
  regen_efficiency: 0.6 # Unitless
  battery_efficiency: 0.95 # Unitless
  passive_electric_loss: 20 # W
  air_density: 1.18 # kg/m^3
  array_area: 3.98 # m^2
  tire_pressure: 5.5 # bar
  array_efficiency: 0.252 # Unitless
  max_braking_force: 2786.04 # N (corresponds with 1G)
  max_motor_power: 5000 # W
  max_soc: 5.2 # kWh
  roll_res_slope_path: data/luts/wsc/static/rr2.csv
  roll_res_yint_path: data/luts/wsc/static/rr1.csv
  power_factor_path: data/luts/wsc/static/powerfactor.csv

\Route:
  max_route_speed: 100 # kph (Stuart highway speed limit)
  base_route_path: data/luts/wsc/static/baseroute.csv
  control_stops: 2962,5559,9462,11421,14439,16990,20832,23202,25987 # Coordinate indices in the route csv 

\Simulator:
  wind_speed_path: data/luts/wsc/dynamic/wind_speed_10m.csv
  wind_direction_path: data/luts/wsc/dynamic/wind_direction_10m.csv
  dni_path: data/luts/wsc/dynamic/dni.csv
  dhi_path: data/luts/wsc/dynamic/dhi.csv
  control_stop_charge_time: 30 # Minutes
  current_soc: 5.2 # kWh
  gps_coordinates: -12.46322,130.84618,24.7 # Lat(degrees),Lon(degrees),Alt(metres)
  current_date_time: 2023-10-22T08:00:00+09:30
  day_one_start_tiem: 2023-10-22T08:00:00+09:30
  day_one_end_time: 2023-10-22T17:00:00+09:30
  day_start_time: 2023-10-22T08:00:00+09:30  # Only HH:MM:SS components are used
  day_end_time: 2023-10-22T17:00:00+09:30    # Only HH:MM:SS components are used
  race_end_time: 2023-10-28T17:00:00+09:30

\Optimizer:
  min_speed: 10 # km/h. Minimum speed to consider in any solution
  max_speed: 80 # km/h. Maximum speed to consider in any solution
  threads: 0.5 # proportion of hardware_concurrency() threads to use
  results_dir: Wsc_Results/
  save_csv: true
