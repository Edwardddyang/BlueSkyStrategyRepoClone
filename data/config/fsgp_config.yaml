# For Gen 12.5
/Version: "FSGP_2026"

# NOTE: ALL PATHS ARE RELATIVE TO $STRAT_ROOT

/Car: # Car characterizationss for Aurora
  car_mass: 284 # kg
  cda: 0.12 # Unitless
  motor_efficiency: 0.9 # Unitless
  regen_efficiency: 0.6 # Unitless
  battery_efficiency: 0.95 # Unitless
  passive_electric_loss: 20 # W
  air_density: 1.18 # kg/m^3
  array_area: 3.98 # m^2
  tire_pressure: 5.5 # bar
  array_efficiency: 0.252 # Unitless
  max_braking_force: 2786.04 # N (corresponds with 1G)
  max_motor_power: 5000 # W
  max_soc: 5.2 # kWh
  roll_res_slope_path: data/luts/fsgp/static/rr2.csv
  roll_res_yint_path: data/luts/fsgp/static/rr1.csv
  power_factor_path: data/luts/fsgp/static/powerfactor.csv

\Route:
  max_route_speed: 104 # kph (Regulation section 12.13A)
  base_route_path: data/luts/fsgp/static/fsgp_base_route.csv
  precomputed_distances_path: data/luts/fsgp/static/precomputed_distances.csv
  corners_path: data/luts/fsgp/static/fsgp_corners.csv


\Simulator:
  wind_speed_path: data/luts/fsgp/dynamic/wind_speed_10m.csv
  wind_direction_path: data/luts/fsgp/dynamic/wind_direction_10m.csv
  dni_path: data/luts/fsgp/dynamic/dni.csv
  dhi_path: data/luts/fsgp/dynamic/dhi.csv
  overnight_charging_location: 37.000823,-86.367676,0.157135 # Coordinates of the charging location
  impounding_start_time: 2025-06-02T20:00:00-06:00 # Only HH:MM:SS component is used
  impounding_release_time: 2025-06-02T07:00:00-06:00 # Only HH:MM:SS component is used
  current_soc: 5.2 # kWh
  gps_coordinates: 37.0011542,-86.3683294,0.157135 # Lat(degrees),Lon(degrees),Alt(metres)
  current_date_time: 2025-06-02T10:00:00-06:00
  day_one_start_time: 2025-06-02T10:00:00-06:00
  day_one_end_time: 2025-06-02T18:00:00-06:00
  day_start_time: 2025-06-02T09:00:00-06:00 # Only HH:MM:SS component is used
  day_end_time: 2025-06-02T17:00:00-06:00 # Only HH:MM:SS component is used
  race_end_time: 2025-06-08T17:00:00-06:00 # Only HH:MM:SS component is used

# \Optimizer:
#   optimizer: Acceleration # type of optimization
#   threads: 0.6 # Fractional number of machine threads to use
