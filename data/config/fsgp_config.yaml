#   min_acceleration: 0.1 # Minimum acceleration that can be considered in m/s^2
#   average_speed: 15.0 # Average speed to try and maintain throughout the route. The profile creator
#                       # uses this value as the mean of a gaussian distribution to sample for
#   fix_loops: true # Fix the number of loops to create. If true, then uses max_num_loops
